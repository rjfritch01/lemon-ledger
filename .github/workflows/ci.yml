name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync
        working-directory: apps/api
      - uses: extractions/setup-just@v2
      - run: just api-lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync
        working-directory: apps/api
      - uses: extractions/setup-just@v2
      - run: just api-typecheck

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync
        working-directory: apps/api
      - uses: extractions/setup-just@v2
      - run: just api-security

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync
        working-directory: apps/api
      - uses: extractions/setup-just@v2
      - name: Assert single Alembic migration head
        run: |
          cd apps/api
          heads=$(uv run alembic heads | sed '/^$/d' | wc -l | tr -d ' ')
          if [ "$heads" != "1" ]; then
            echo "::error::Expected exactly 1 Alembic head, found $heads"
            uv run alembic heads
            exit 1
          fi
          echo "Single migration head confirmed."
      - run: just api-test

  # Non-blocking live-network job — NOT in the four required branch-protection checks.
  # Promote to required once proven stable on testnet.
  integration:
    name: Integration (Non-Blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: lemon_ledger
          POSTGRES_USER: lemon
          POSTGRES_PASSWORD: changeme
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync
        working-directory: apps/api
      - uses: extractions/setup-just@v2
      - name: Install Doppler CLI
        run: curl -Ls https://cli.doppler.com/install.sh | sh
      - name: Run integration tests via Doppler
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: doppler run -- just api-test-integration
