name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync
        working-directory: apps/api
      - uses: extractions/setup-just@v2
      - run: just api-lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync
        working-directory: apps/api
      - uses: extractions/setup-just@v2
      - run: just api-typecheck

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync
        working-directory: apps/api
      - uses: extractions/setup-just@v2
      - run: just api-security

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync
        working-directory: apps/api
      - uses: extractions/setup-just@v2
      - name: Assert single Alembic migration head
        run: |
          cd apps/api
          heads=$(uv run alembic heads | sed '/^$/d' | wc -l | tr -d ' ')
          if [ "$heads" != "1" ]; then
            echo "::error::Expected exactly 1 Alembic head, found $heads"
            uv run alembic heads
            exit 1
          fi
          echo "Single migration head confirmed."
      - run: just api-test
