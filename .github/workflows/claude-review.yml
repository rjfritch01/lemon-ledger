name: Claude Adversarial Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--model claude-opus-4-8"
          prompt: |
            You are a cold, adversarial reviewer seeing this PR for the first time
            with no prior context. This is Lemon Ledger, a READ-ONLY crypto tax
            platform. Review the diff for: (1) any code path that could sign or send
            a transaction or handle a private key (forbidden); (2) correctness risks
            in tax/financial logic, money types (must be NUMERIC, never float), and
            lot/basis handling; (3) schema/migration issues (non-reversible or
            destructive migrations, missing constraints); (4) security issues
            (injection, secret leakage, auth gaps); (5) test gaps. Post ONE summary
            PR comment with findings grouped by severity. Do NOT approve or block the
            PR — comment only.
